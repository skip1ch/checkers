<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Шашки</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1c1c1c; --surf:#252525; --surf2:#2e2e2e; --surf3:#3a3a3a; --surf4:#424242;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --primary:#38bdf8; --primary-d:#0284c7; --primary-dim:rgba(56,189,248,0.1);
  --text:#e4e4e7; --text2:#a1a1aa; --text3:#52525b;
  --green:#4ade80; --red:#f87171; --gold:#fbbf24;
  --sq-d:#b58863; --sq-l:#f0d9b5;
  --sb:188px; --r:8px; --r2:12px;
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
input{font-family:'Inter',sans-serif;}

/* ── SHELL ──────────────────────────────────────────────── */
.app-shell{display:flex;height:100vh;height:100dvh;overflow:hidden;}
.app-main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.app-main-game{overflow:hidden;}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo-icon{font-size:1.3rem;color:var(--primary);}
.sb-logo-text{font-size:1.05rem;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:1px;padding:8px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);border:none;background:none;color:var(--text2);font-size:.88rem;font-weight:500;text-align:left;transition:background .12s,color .12s;width:100%;}
.sb-item:hover{background:var(--surf2);color:var(--text);}
.sb-active{background:var(--primary-dim)!important;color:var(--primary)!important;font-weight:600;}
.sb-ico{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0;}
.sb-lbl{flex:1;}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s;}
.sb-user:hover{background:var(--surf2);}
.sb-uav{font-size:1.4rem;width:32px;height:32px;background:var(--surf3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-umeta{flex:1;min-width:0;}
.sb-uname{display:block;font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-ucups{display:block;font-size:.72rem;color:var(--gold);}
.sb-streak{font-size:.8rem;font-weight:700;color:#f97316;flex-shrink:0;}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
.bottom-nav{display:none;flex-shrink:0;background:var(--surf);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0);}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;background:none;border:none;color:var(--text3);transition:color .15s;}
.bn-ico{font-size:1.2rem;}
.bn-lbl{font-size:.6rem;font-weight:600;}
.bn-active{color:var(--primary);}

/* ── HOME ─────────────────────────────────────────────────── */
.home-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none;}
.home-wrap::-webkit-scrollbar{display:none;}
.home-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:5;}
.home-user-chip{display:flex;align-items:center;gap:10px;cursor:pointer;padding:5px 8px;border-radius:var(--r);transition:background .12s;}
.home-user-chip:hover{background:var(--surf2);}
.huc-avatar{font-size:1.5rem;}
.huc-name{font-weight:700;font-size:.95rem;}
.huc-sep{color:var(--text3);}
.huc-cups{font-size:.82rem;color:var(--gold);font-weight:600;}
.home-streak{display:flex;flex-direction:column;align-items:center;gap:2px;}
.streak-label{font-size:.7rem;color:#f97316;font-weight:600;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

.home-body{display:flex;gap:20px;padding:20px 24px 80px;flex:1;align-items:flex-start;}
.home-left{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
.home-right{flex:1;min-width:0;}

/* Home cards */
.home-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:15px;}
.arena-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.arena-badge{font-size:2rem;}
.arena-name{font-weight:700;font-size:.95rem;}
.arena-cups{font-size:.76rem;color:var(--text2);margin-top:1px;}
.progress-track{height:4px;background:var(--surf3);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .6s;}
.arena-next{font-size:.7rem;color:var(--text3);}
.streak-card-lg{display:flex;align-items:center;gap:14px;}
.sc-body{}
.sc-title{font-weight:700;font-size:.9rem;}
.sc-sub{font-size:.75rem;color:var(--text2);margin-top:2px;}
.lesson-teaser{display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.lesson-teaser:hover{background:var(--surf2);}
.lt-icon{font-size:1.5rem;}
.lt-label{font-size:.7rem;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.lt-title{font-weight:700;font-size:.88rem;}
.lt-arrow{margin-left:auto;font-size:1.2rem;color:var(--text3);}

/* Quick actions */
.quick-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:7px;}
.quick-actions{display:flex;flex-direction:column;gap:5px;margin-bottom:0;}
.qa-btn{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);text-align:left;transition:background .12s,border-color .12s;}
.qa-btn:hover{background:var(--surf2);border-color:var(--border2);}
.qa-primary{background:var(--primary-dim)!important;border-color:rgba(56,189,248,.2)!important;}
.qa-icon{font-size:1.2rem;width:26px;text-align:center;flex-shrink:0;}
.qa-btn strong{display:block;font-size:.88rem;font-weight:600;}
.qa-btn small{font-size:.72rem;color:var(--text2);}
.recent-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.rr-badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;}
.rr-win{background:rgba(74,222,128,.1);color:var(--green);}
.rr-loss{background:rgba(248,113,113,.1);color:var(--red);}
.rr-info{flex:1;}
.rr-opp{display:block;font-weight:600;font-size:.86rem;}
.rr-mode{font-size:.7rem;color:var(--text2);}
.rr-cups{font-weight:700;font-size:.82rem;}
.cups-up{color:var(--green);}
.cups-dn{color:var(--red);}

/* ── INNER PAGES ──────────────────────────────────────────── */
.inner-page{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ip-header{display:flex;align-items:center;justify-content:space-between;padding:15px 24px 11px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ip-header h2{font-size:1.05rem;font-weight:700;}
.ip-body{flex:1;overflow-y:auto;padding:16px 24px 80px;scrollbar-width:none;}
.ip-body::-webkit-scrollbar{display:none;}
.back-btn{background:none;border:none;font-size:1.4rem;color:var(--text2);padding:2px 6px;border-radius:6px;transition:background .12s;}
.back-btn:hover{background:var(--surf2);}
.back-link{position:absolute;top:18px;left:14px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:6px 13px;font-size:.82rem;font-weight:600;color:var(--text2);transition:background .12s;}
.back-link:hover{background:var(--surf2);}
.center-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:24px;gap:16px;}

/* ── GAME ─────────────────────────────────────────────────── */
.game-root{display:flex;height:100%;overflow:hidden;position:relative;}
.game-board-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 10px;gap:8px;min-width:0;min-height:0;}
.player-bar{display:flex;align-items:center;gap:10px;width:100%;max-width:500px;padding:0 2px;}
.pb-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.pb-av-wrap{width:36px;height:36px;background:var(--surf);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pb-av{font-size:1.3rem;}
.pb-info{flex:1;min-width:0;}
.pb-name{display:flex;align-items:center;gap:5px;font-weight:600;font-size:.9rem;}
.turn-dot{color:var(--green);font-size:.75rem;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.pb-sub{font-size:.72rem;color:var(--text2);}
.pb-timer{display:flex;align-items:center;gap:5px;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.8rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2);}
.pb-actions{display:flex;gap:6px;}
.ico-btn{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .12s;}
.ico-btn:hover{background:var(--surf2);}
.ico-danger:hover{border-color:rgba(248,113,113,.3);}
.think-dots{display:flex;gap:4px;align-items:center;}
.think-dots span{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:blink 1.1s infinite;}
.think-dots span:nth-child(2){animation-delay:.2s;}
.think-dots span:nth-child(3){animation-delay:.4s;}

/* Board */
.board-outer{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;max-width:500px;}
.board{aspect-ratio:1;height:100%;width:auto;max-width:100%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border-radius:3px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.4);}
.sq{position:relative;display:flex;align-items:center;justify-content:center;}
.sq-d{background:var(--sq-d);cursor:pointer;}
.sq-l{background:var(--sq-l);}
.sq-d:hover{filter:brightness(1.07);}
.sq-sel{box-shadow:inset 0 0 0 3px rgba(255,214,0,.9)!important;}
.sq-last{box-shadow:inset 0 0 0 2px rgba(255,214,0,.3);}

/* Pieces */
.piece{width:76%;height:76%;border-radius:50%;position:relative;cursor:pointer;transition:transform .12s;}
.piece:hover{transform:scale(1.06);}
.pw{background:radial-gradient(circle at 36% 32%,#ffffff,#d4d4d4);border:2.5px solid #b8b8b8;box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 4px rgba(255,255,255,.9);}
.pb{background:radial-gradient(circle at 36% 32%,#505050,#111111);border:2.5px solid #484848;box-shadow:0 3px 10px rgba(0,0,0,.6),inset 0 1px 3px rgba(255,255,255,.1);}
.piece::before{content:'';position:absolute;inset:16%;border-radius:50%;border:1.5px solid;}
.pw::before{border-color:rgba(0,0,0,.08);}
.pb::before{border-color:rgba(255,255,255,.1);}
.piece::after{content:'';position:absolute;top:13%;left:18%;width:26%;height:15%;border-radius:50%;background:rgba(255,255,255,.42);}
.pb::after{background:rgba(255,255,255,.07);}
.psel{transform:scale(1.1);box-shadow:0 0 0 3px rgba(255,215,0,.8),0 4px 14px rgba(0,0,0,.5)!important;}
.pcap{animation:capPop .35s ease-out forwards;pointer-events:none;}
@keyframes capPop{0%{transform:scale(1);opacity:1;}60%{transform:scale(1.3);opacity:.5;}100%{transform:scale(0);opacity:0;}}
.king-mark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:55%;color:rgba(255,200,0,.85);pointer-events:none;z-index:1;}
.mv-dot{width:28%;height:28%;border-radius:50%;background:rgba(0,0,0,.22);}
.sq-l .mv-dot{background:rgba(0,0,0,.15);}
.cap-ring{position:absolute;inset:6px;border-radius:50%;border:3px solid rgba(0,0,0,.28);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:.7;}50%{opacity:.3;}}
.float-emoji{position:absolute;font-size:2rem;pointer-events:none;animation:floatUp 2.5s ease-out forwards;z-index:40;}
@keyframes floatUp{0%{transform:translateY(0) scale(.4);opacity:0;}15%{transform:translateY(-20px) scale(1.2);opacity:1;}85%{opacity:1;}100%{transform:translateY(-110px) scale(.9);opacity:0;}}

/* Emoji tray */
.emoji-tray{display:flex;justify-content:center;gap:6px;padding:9px 14px;background:var(--surf);border-top:1px solid var(--border);width:100%;max-width:500px;}
.em-btn{background:var(--surf2);border:1px solid var(--border);border-radius:9px;font-size:1.3rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:background .12s,transform .1s;}
.em-btn:hover{background:var(--surf3);}
.em-btn:active{transform:scale(.88);}

/* Side panel */
.game-side{width:252px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surf);display:flex;flex-direction:column;overflow:hidden;}
.coach-panel{padding:13px;border-bottom:1px solid var(--border);}
.cp-head{display:flex;align-items:center;gap:8px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);margin-bottom:8px;}
.cp-bubble{background:var(--surf2);border-radius:var(--r);padding:11px 12px;font-size:.82rem;line-height:1.5;}
.status-panel{padding:11px 13px;border-bottom:1px solid var(--border);}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:99px;font-size:.78rem;font-weight:600;}
.st-yours{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.18);}
.st-theirs{background:var(--surf2);color:var(--text2);border:1px solid var(--border);}
.side-log{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.side-log-title{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:9px 13px 5px;}
.move-log{flex:1;overflow-y:auto;padding:2px 13px 6px;display:flex;flex-direction:column;gap:1px;scrollbar-width:none;}
.move-log::-webkit-scrollbar{display:none;}
.no-moves{font-size:.74rem;color:var(--text3);padding:4px 0;}
.ml-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;font-size:.75rem;}
.ml-row.ml-me{background:var(--primary-dim);}
.ml-n{color:var(--text3);width:22px;flex-shrink:0;}
.ml-wp,.ml-bp{font-size:.7rem;}
.ml-to{font-weight:500;flex:1;}
.ml-cap{color:var(--red);font-size:.68rem;}
.side-counts{display:flex;border-top:1px solid var(--border);flex-shrink:0;}
.sc-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;gap:3px;border-right:1px solid var(--border);}
.sc-item:last-child{border-right:none;}
.sc-item span{font-size:1.1rem;font-weight:700;}
.sc-item small{font-size:.62rem;color:var(--text3);text-align:center;}

/* Game over */
.go-overlay{position:absolute;inset:0;background:rgba(8,8,8,.82);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px);animation:fadeIn .25s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.go-card{background:var(--surf);border:1px solid var(--border2);border-radius:var(--r2);padding:30px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;width:min(320px,90%);}
.go-icon{font-size:3.2rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
.go-card h2{font-size:1.7rem;font-weight:800;}
.go-sub{font-size:.85rem;color:var(--text2);}
.go-stats{display:flex;gap:20px;padding:4px 0;}
.go-stats div{display:flex;flex-direction:column;align-items:center;gap:3px;}
.go-stats strong{font-size:1.2rem;font-weight:700;color:var(--primary);}
.go-stats small{font-size:.68rem;color:var(--text2);}

/* ── MATCHMAKING ──────────────────────────────────────────── */
.mm-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.mm-rings{position:relative;width:110px;height:110px;}
.mmr{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;}
.r1{border-top-color:var(--primary);animation:spin 1s linear infinite;}
.r2{inset:14px;border-top-color:rgba(56,189,248,.35);animation:spin .7s linear infinite reverse;}
.r3{inset:28px;border-top-color:var(--gold);animation:spin 1.4s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.mmr-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.mm-title{font-size:1.25rem;font-weight:700;}
.mm-sub{font-size:.85rem;color:var(--text2);}
.found-check{font-size:3.5rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.found-opp{display:flex;flex-direction:column;align-items:center;gap:6px;}
.found-av{font-size:2.8rem;}
.found-cups{font-size:.85rem;color:var(--gold);font-weight:600;}

/* ── AI SELECT ──────────────────────────────────────────────── */
.ai-cards{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ai-card{display:flex;align-items:center;gap:13px;padding:14px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);text-align:left;transition:background .12s,border-color .12s;}
.ai-card:hover{background:var(--surf2);border-color:var(--border2);}
.ac-icon{font-size:1.8rem;width:40px;text-align:center;flex-shrink:0;}
.ac-body{flex:1;}
.ac-body strong{display:block;font-size:.92rem;font-weight:700;margin-bottom:3px;}
.ac-body p{font-size:.75rem;color:var(--text2);margin-bottom:4px;}
.ac-cups{font-size:.72rem;color:var(--gold);font-weight:600;}
.ac-arrow{font-size:1.3rem;color:var(--text3);}
.coach-toggle-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;}
.ct-icon-wrap{flex-shrink:0;}
.ct-body{flex:1;}
.ct-title{font-weight:600;font-size:.88rem;margin-bottom:2px;}
.ct-sub{font-size:.72rem;color:var(--text2);}
.toggle-btn{width:44px;height:24px;border-radius:99px;background:var(--surf3);border:none;position:relative;flex-shrink:0;transition:background .2s;}
.tog-on{background:var(--primary);}
.tog-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;}
.tog-on .tog-knob{left:23px;}

/* ── POST GAME ────────────────────────────────────────────── */
.pg-hero{text-align:center;padding:26px 24px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.pg-result-icon{font-size:3.5rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.pg-title{font-size:1.9rem;font-weight:800;}
.pg-delta{font-size:1.5rem;font-weight:800;}
.delta-up{color:var(--green);}
.delta-dn{color:var(--red);}
.pg-total{font-size:.78rem;color:var(--text2);}
.pg-stat-row{display:flex;justify-content:space-around;padding:4px 24px 14px;}
.pg-stat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.pg-stat strong{font-size:1.3rem;font-weight:700;color:var(--primary);}
.pg-stat small{font-size:.68rem;color:var(--text2);}
.coach-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;}
.cc-head{display:flex;align-items:center;gap:8px;padding:11px 14px;font-weight:700;font-size:.85rem;color:var(--primary);border-bottom:1px solid var(--border);background:var(--primary-dim);}
.cc-tip{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.cc-tip:last-child{border-bottom:none;}
.cc-tip-icon{font-size:1.2rem;flex-shrink:0;}
.cc-tip strong{display:block;font-size:.83rem;margin-bottom:3px;}
.cc-tip p{font-size:.75rem;color:var(--text2);line-height:1.45;}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- Game Logic -->
<script>
const GL = (() => {
  'use strict';
  const E=0, W=1, WK=2, B=3, BK=4;
  const isW = p => p===W||p===WK;
  const isB = p => p===B||p===BK;
  const isK = p => p===WK||p===BK;
  const inB = (r,c) => r>=0&&r<8&&c>=0&&c<8;
  const dark = (r,c) => (r+c)%2===1;
  const clone = b => b.map(r=>[...r]);
  const had = (cs,r,c) => cs.some(([a,d])=>a===r&&d===c);

  function init() {
    const b = Array.from({length:8},()=>Array(8).fill(E));
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      if(!dark(r,c)) continue;
      if(r<3) b[r][c]=B;
      if(r>4) b[r][c]=W;
    }
    return b;
  }

  function findCaps(b, r, c, done, wt) {
    const p = b[r][c];
    const res = [];
    const DIRS = [[-1,-1],[-1,1],[1,-1],[1,1]];
    if(isK(p)) {
      for(const [dr,dc] of DIRS) {
        let nr=r+dr, nc=c+dc, enemy=null;
        while(inB(nr,nc)) {
          const t = b[nr][nc];
          if(!enemy) {
            if(t!==E) {
              const isEnemy = wt ? isB(t) : isW(t);
              if(isEnemy && !had(done,nr,nc)) enemy=[nr,nc];
              else break;
            }
          } else {
            if(t!==E) break;
            const nd = [...done, enemy];
            const tb = clone(b);
            tb[r][c]=E; tb[enemy[0]][enemy[1]]=E; tb[nr][nc]=p;
            const more = findCaps(tb,nr,nc,nd,wt);
            if(more.length) more.forEach(m=>res.push({to:m.to, caps:[enemy,...m.caps]}));
            else res.push({to:[nr,nc], caps:[enemy]});
          }
          nr+=dr; nc+=dc;
        }
      }
    } else {
      for(const [dr,dc] of DIRS) {
        const mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
        if(!inB(lr,lc)) continue;
        const t = b[mr][mc];
        if(t===E) continue;
        const isEnemy = wt ? isB(t) : isW(t);
        if(!isEnemy || had(done,mr,mc) || b[lr][lc]!==E) continue;
        const promotes = (p===W&&lr===0)||(p===B&&lr===7);
        const nd = [...done,[mr,mc]];
        if(promotes) {
          res.push({to:[lr,lc], caps:[[mr,mc]]});
        } else {
          const tb = clone(b);
          tb[r][c]=E; tb[mr][mc]=E; tb[lr][lc]=p;
          const more = findCaps(tb,lr,lc,nd,wt);
          if(more.length) more.forEach(m=>res.push({to:m.to, caps:[[mr,mc],...m.caps]}));
          else res.push({to:[lr,lc], caps:[[mr,mc]]});
        }
      }
    }
    return res;
  }

  function getMoves(b, wt) {
    const caps=[], regs=[];
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      const p = b[r][c];
      if(p===E||(wt?!isW(p):!isB(p))) continue;
      const cs = findCaps(b,r,c,[],wt);
      if(cs.length) { cs.forEach(s=>caps.push({from:[r,c],to:s.to,caps:s.caps})); continue; }
      if(isK(p)) {
        for(const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
          let nr=r+dr,nc=c+dc;
          while(inB(nr,nc)&&b[nr][nc]===E){ regs.push({from:[r,c],to:[nr,nc],caps:[]}); nr+=dr; nc+=dc; }
        }
      } else {
        const fwd=wt?-1:1;
        for(const dc of[-1,1]) {
          const nr=r+fwd, nc=c+dc;
          if(inB(nr,nc)&&b[nr][nc]===E) regs.push({from:[r,c],to:[nr,nc],caps:[]});
        }
      }
    }
    return caps.length ? caps : regs;
  }

  function apply(b, m) {
    const nb = clone(b);
    const [fr,fc]=m.from, [tr,tc]=m.to;
    const p = nb[fr][fc];
    nb[fr][fc]=E;
    m.caps.forEach(([cr,cc])=>nb[cr][cc]=E);
    let np=p;
    if(p===W&&tr===0) np=WK;
    if(p===B&&tr===7) np=BK;
    nb[tr][tc]=np;
    return nb;
  }

  function evalBoard(b) {
    let s=0;
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      const p=b[r][c];
      const centerBonus = (r>=2&&r<=5&&c>=2&&c<=5) ? 0.5 : 0;
      if(p===W)  s += 10 + (7-r)*0.4 + centerBonus;
      else if(p===WK) s += 32 + centerBonus;
      else if(p===B)  s -= 10 + r*0.4 + centerBonus;
      else if(p===BK) s -= 32 + centerBonus;
    }
    return s;
  }

  function minimax(b, depth, alpha, beta, maximizing, wt) {
    const mvs = getMoves(b,wt);
    if(!depth||!mvs.length) return mvs.length ? evalBoard(b) : (maximizing?-10000:10000);
    if(maximizing) {
      let v=-Infinity;
      for(const m of mvs) {
        v=Math.max(v,minimax(apply(b,m),depth-1,alpha,beta,false,!wt));
        alpha=Math.max(alpha,v); if(beta<=alpha) break;
      }
      return v;
    } else {
      let v=Infinity;
      for(const m of mvs) {
        v=Math.min(v,minimax(apply(b,m),depth-1,alpha,beta,true,!wt));
        beta=Math.min(beta,v); if(beta<=alpha) break;
      }
      return v;
    }
  }

  function getAIMove(b, wt, diff) {
    const mvs = getMoves(b,wt);
    if(!mvs.length) return null;
    if(diff==='easy') {
      if(Math.random()<0.6) return mvs[Math.floor(Math.random()*mvs.length)];
      let best=null, bs=wt?-Infinity:Infinity;
      for(const m of mvs) {
        const s=evalBoard(apply(b,m));
        if(wt?s>bs:s<bs){bs=s;best=m;}
      }
      return best;
    }
    const depth = diff==='medium'?3:5;
    let best=null, bs=wt?-Infinity:Infinity;
    for(const m of mvs) {
      const s=minimax(apply(b,m),depth-1,-Infinity,Infinity,!wt,!wt);
      if(wt?s>bs:s<bs){bs=s;best=m;}
    }
    if(diff==='medium'&&Math.random()<0.2) return mvs[Math.floor(Math.random()*mvs.length)];
    return best;
  }

  function checkWinner(b, wt) {
    if(!getMoves(b,wt).length) return wt?'B':'W';
    let w=0,bl=0;
    for(let r=0;r<8;r++) for(let c=0;c<8;c++){if(isW(b[r][c]))w++;else if(isB(b[r][c]))bl++;}
    if(!w) return 'B';
    if(!bl) return 'W';
    return null;
  }

  function countPieces(b) {
    let w=0,wk=0,bl=0,bk=0;
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      if(b[r][c]===W)w++; else if(b[r][c]===WK)wk++;
      else if(b[r][c]===B)bl++; else if(b[r][c]===BK)bk++;
    }
    return{w,wk,bl,bk};
  }

  return {E,W,WK,B,BK, isW,isB,isK, dark, init, getMoves, apply, getAIMove, checkWinner, countPieces};
})();
</script>

function snd(freq, type='sine', vol=0.15, dur=0.12) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur+0.02);
  } catch(e){}
}

// ══ MATCHMAKING ══
function MatchmakingScreen({ navigate, user, arena, screenParams }) {
  const mode=screenParams?.mode||'online';
  const aiDiff=screenParams?.aiDifficulty||'medium';
  const coach=screenParams?.coachMode||false;
  const [dots,setDots]=React.useState(1);
  const [found,setFound]=React.useState(false);
  const [opp]=React.useState(()=>{
    const pool=LEADERBOARD_DATA.filter(p=>Math.abs(p.cups-user.cups)<350);
    return pool.length?pool[Math.floor(Math.random()*pool.length)]:LEADERBOARD_DATA[5];
  });
  React.useEffect(()=>{
    const d=setInterval(()=>setDots(v=>v%3+1),500);
    const f=setTimeout(()=>{setFound(true);clearInterval(d);},mode==='ai'?1000:2600+Math.random()*1000);
    return()=>{clearInterval(d);clearTimeout(f);};
  },[]);
  React.useEffect(()=>{
    if(!found) return;
    const t=setTimeout(()=>navigate('game',{
      gameMode:mode==='ai'?'ai':'online',aiDifficulty:aiDiff,coachMode:coach,
      opponent:mode==='ai'
        ?{name:`Бот·${aiDiff==='easy'?'Новичок':aiDiff==='medium'?'Любитель':'Мастер'}`,avatar:'🤖',cups:0}
        :opp,
    }),900);
    return()=>clearTimeout(t);
  },[found]);
  return (
    <div className="inner-page center-page">
      <button className="back-link" onClick={()=>navigate('home')}>‹ Отмена</button>
      {!found?(
        <div className="mm-wrap">
          <div className="mm-rings">
            <div className="mmr r1"/><div className="mmr r2"/><div className="mmr r3"/>
            <div className="mmr-ico">{mode==='ai'?'🤖':'🔍'}</div>
          </div>
          <div className="mm-title">{mode==='ai'?'Готовим бота':'Ищем соперника'}{'·'.repeat(dots)}</div>
          <div className="mm-sub">{mode==='ai'?`Уровень: ${aiDiff==='easy'?'Новичок':aiDiff==='medium'?'Любитель':'Мастер'}`:`${user.cups} кубков · ${arena.icon} ${arena.name}`}</div>
        </div>
      ):(
        <div className="mm-wrap">
          <div className="found-check">✅</div>
          <div className="mm-title">Найден!</div>
          <div className="found-opp">
            <span className="found-av">{mode==='ai'?'🤖':opp.avatar}</span>
            <strong>{mode==='ai'?'Бот':opp.name}</strong>
            {mode!=='ai'&&<span className="found-cups">{opp.cups} 🏆</span>}
          </div>
        </div>
      )}
    </div>
  );
}

function PostGameScreen({ result, cupsChange, user, navigate }) {

        </div>
        <div className="pg-stat-row">
          <div className="pg-stat"><strong>{result?.moves||0}</strong><small>Ходов</small></div>
          <div className="pg-stat"><strong>{result?.pCaps||0}</strong><small>Взято</small></div>

        </div>
        <div className="coach-card">
          <div className="cc-head"><span>👨‍🏫</span><span>Разбор AI-тренера</span></div>
          {tips.map((t,i)=>(
            <div key={i} className="cc-tip">
              <span className="cc-tip-icon">{t.icon}</span>
              <div><strong>{t.t}</strong><p>{t.d}</p></div>

  const wr=Math.round(user.wins/Math.max(user.wins+user.losses,1)*100);

  React.useEffect(()=>{
    if(tab!=='history'||!session) return;

    sb.from('game_history').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}).limit(20)

// ══ MULTIPLAYER LOBBY ══
function MultiplayerLobbyScreen({ navigate, user }) {
  const [mode,setMode]=React.useState(null);
  const [code,setCode]=React.useState('');
  const [inputCode,setInputCode]=React.useState('');
  const [status,setStatus]=React.useState('');
  const [opponent,setOpponent]=React.useState(null);
  const chRef=React.useRef(null);

  React.useEffect(()=>()=>{ chRef.current?.unsubscribe(); },[]);

  function createRoom(){
    const c=Math.random().toString(36).slice(2,8).toUpperCase();
    setCode(c); setMode('create'); setStatus('Ожидание соперника…');
    const ch=sb.channel(`room-${c}`,{config:{broadcast:{self:false}}});
    chRef.current=ch;
    ch.on('broadcast',{event:'guest-join'},({payload})=>{
      setOpponent(payload); setStatus('Соперник найден!');
      setTimeout(()=>{
        ch.send({type:'broadcast',event:'start',payload:{hostName:user.name,hostAvatar:user.avatar}});
        navigate('game',{gameMode:'multiplayer',myColor:'white',roomCode:c,opponent:{name:payload.name,avatar:payload.avatar||'😊'}});
      },800);
    });
    ch.subscribe();
  }

  function joinRoom(){
    const c=inputCode.trim().toUpperCase();
    if(c.length!==6) return;
    setMode('join'); setStatus('Подключаемся…');
    const ch=sb.channel(`room-${c}`,{config:{broadcast:{self:false}}});
    chRef.current=ch;
    ch.on('broadcast',{event:'start'},({payload})=>{
      setTimeout(()=>navigate('game',{gameMode:'multiplayer',myColor:'black',roomCode:c,opponent:{name:payload.hostName,avatar:payload.hostAvatar||'🤖'}}),400);
    });
    ch.subscribe(s=>{
      if(s==='SUBSCRIBED'){
        ch.send({type:'broadcast',event:'guest-join',payload:{name:user.name,avatar:user.avatar}});
        setStatus('Ожидание подтверждения…');
      }
    });
  }

  return(
    <div className="inner-page">
      <div className="ip-header">
        <button className="back-btn" onClick={()=>navigate('home')}>‹</button>
        <h2>🌐 Игра с другом</h2><div/>
      </div>
      <div className="ip-body">
        {!mode&&(<>
          <button className="qa-btn qa-primary" style={{marginBottom:8}} onClick={createRoom}>
            <span className="qa-icon">🏠</span>
            <div><strong>Создать комнату</strong><small>Поделись кодом с другом</small></div>
          </button>
          <div className="mp-divider">— или —</div>
          <div style={{display:'flex',gap:8}}>
            <input className="text-input" placeholder="Код комнаты (6 букв)" value={inputCode}
              onChange={e=>setInputCode(e.target.value.toUpperCase())} maxLength={6}
              style={{textTransform:'uppercase',letterSpacing:'.1em',fontWeight:700}}/>
            <button className="btn-primary" style={{width:'auto',padding:'9px 16px'}} onClick={joinRoom}>Войти →</button>
          </div>
        </>)}
        {mode==='create'&&(<>
          <div className="mp-room-box">
            <div style={{fontSize:'.78rem',color:'var(--text2)',marginBottom:6}}>Код комнаты</div>
            <div className="mp-code">{code}</div>
            <div className="mp-hint">Дай этот код другу — он вводит его и подключается</div>
          </div>
          {opponent
            ?<div className="mp-status">✅ {opponent.name} подключился! Начинаем…</div>
            :<div className="mp-status"><div className="think-dots"><span/><span/><span/></div>{status}</div>}
        </>)}
        {mode==='join'&&<div className="mp-status"><div className="think-dots"><span/><span/><span/></div>{status}</div>}
      </div>
    </div>
  );
}

// ══ APP ══
function App() {
  const [session, setSession] = React.useState(undefined);
  const [screen,  setScreen]  = React.useState('home');
  const [params,  setParams]  = React.useState({});
  const [theme,   setTheme]   = React.useState(()=>localStorage.getItem('theme')||'dark');
  const [user,    setUser]    = React.useState({
    name:'Игрок', cups:750, streak:0, wins:0, losses:0,
    avatar:'😊', isPro:false, streakShield:false,
    ownedItems:['standard_emoji'],
    emojiPack:['👋','🎉','😱','🔥','💀','😅','🤝','👍'],
  });
  const [result, setResult] = React.useState(null);
  const [delta,  setDelta]  = React.useState(0);

  React.useEffect(()=>{ document.body.className=theme; localStorage.setItem('theme',theme); },[theme]);

  React.useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session||null);
      if(session) loadProfile(session.user.id);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      setSession(session||null);
      if(session) loadProfile(session.user.id);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function loadProfile(uid) {
    const {data} = await sb.from('profiles').select('*').eq('id',uid).single();
    if(data) setUser(u=>({...u,
      name:data.username, cups:data.cups, streak:data.streak,
      wins:data.wins, losses:data.losses, avatar:data.avatar||'😊',
      city:data.city||'',
      ownedItems:data.owned_items||['standard_emoji'], isPro:data.is_pro||false,
    }));
  }

  async function saveProfile(u) {
    if(!session) return;
    await sb.from('profiles').update({
      username:u.name, cups:u.cups, streak:u.streak, wins:u.wins,
      losses:u.losses, avatar:u.avatar, owned_items:u.ownedItems,
      is_pro:u.isPro, city:u.city||'', updated_at:new Date().toISOString(),
    }).eq('id',session.user.id);
  }

  async function saveGame(r, d) {
    if(!session) return;
    await sb.from('game_history').insert({
      user_id:session.user.id,
      opponent:params.opponent?.name||'Бот',
      game_mode:r.gameMode||'ai',
      winner:r.winner, cups_change:d,
      moves:r.moves||0, duration:r.timer||0,
    });
  }

  function navigate(s,p={}){ setScreen(s); setParams(p); }

  function handleGameEnd(r) {
    const d=calcCups(r);
    setDelta(d);
    setResult({...r, prevCups:user.cups});
    setUser(u=>{
      const nu={...u,
        cups:Math.max(0,u.cups+d),
        wins:r.winner==='W'?u.wins+1:u.wins,
        losses:r.winner!=='W'?u.losses+1:u.losses,
        streak:r.winner==='W'?u.streak+1:Math.max(0,u.streak-(u.streakShield?0:1)),
      };
      saveProfile(nu);
      saveGame(r,d);
      return nu;
    });
    navigate('postgame');
  }

  function handleResign() {
    handleGameEnd({winner:'B',moves:0,pCaps:0,aCaps:0,
      gameMode:params.gameMode||'ai',aiDifficulty:params.aiDifficulty||'medium'});
  }

  function handlePurchase(item) {
    if(user.cups<item.price) return;
    setUser(u=>{ const nu={...u,cups:u.cups-item.price,ownedItems:[...u.ownedItems,item.id]}; saveProfile(nu); return nu; });
  }

  async function handleSignOut() { await sb.auth.signOut(); setSession(null); }

  async function handleSaveProfile(updated) {
    setUser(u=>({...u,...updated}));
    if(!session) return;
    await sb.from('profiles').update({
      username:updated.name, avatar:updated.avatar,
      city:updated.city||'', updated_at:new Date().toISOString(),
    }).eq('id',session.user.id);
  }

  if(session===undefined) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{color:'var(--text2)'}}>Загрузка…</div>
    </div>
  );

  if(session===null) return <AuthScreen/>;

  const arena  = getArena(user.cups);
  const isGame = screen==='game';

  return (
    <div className="app-shell">
      {!isGame && <Sidebar screen={screen} navigate={navigate} user={user} onSignOut={handleSignOut} theme={theme} setTheme={setTheme}/>}
      <main className={`app-main${isGame?' app-main-game':''}`}>
        {screen==='home'        && <HomeScreen user={user} arena={arena} navigate={navigate} session={session} theme={theme} setTheme={setTheme}/>}
        {screen==='learn'       && <LearnScreen navigate={navigate}/>}
        {screen==='ai-select'   && <AIDifficultyScreen navigate={navigate}/>}
        {screen==='friends'     && <FriendsScreen navigate={navigate} user={user}/>}
        {screen==='matchmaking' && <MatchmakingScreen user={user} arena={arena} navigate={navigate} screenParams={params}/>}
        {screen==='game'        && (
          <GameScreen
            gameMode={params.gameMode||'ai'}
            aiDifficulty={params.aiDifficulty||'medium'}
            coachMode={params.coachMode||false}
            arena={arena} emojiPack={user.emojiPack}
            opponent={params.opponent}
            myColor={params.myColor||'white'}
            roomCode={params.roomCode||''}
            onGameEnd={handleGameEnd} onResign={handleResign}
          />
        )}
        {screen==='postgame'    && <PostGameScreen result={result} cupsChange={delta} user={user} navigate={navigate}/>}
        {screen==='shop'        && <ShopScreen user={user} onPurchase={handlePurchase} navigate={navigate}/>}
        {screen==='leaderboard' && <LeaderboardScreen user={user} navigate={navigate}/>}
        {screen==='profile'     && <ProfileScreen user={user} navigate={navigate} onSignOut={handleSignOut} onSaveProfile={handleSaveProfile} session={session}/>}
        {screen==='mp-lobby'    && <MultiplayerLobbyScreen navigate={navigate} user={user} arena={arena}/>}
        {screen==='clan'        && <ClanScreen navigate={navigate}/>}
        {!isGame && <BottomNav screen={screen} navigate={navigate}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
